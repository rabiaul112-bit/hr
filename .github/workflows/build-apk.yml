name: Build Android APK (عربي)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: تحميل الكود
        uses: actions/checkout@v4

      - name: إعداد Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: إعداد Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0

      - name: منح صلاحيات التنفيذ لـ gradlew
        run: |
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          mkdir -p gradle/wrapper
          cp $ANDROID_SDK_ROOT/tools/templates/gradle/wrapper/gradlew gradlew
          cp $ANDROID_SDK_ROOT/tools/templates/gradle/wrapper/gradlew.bat gradlew.bat
          cp $ANDROID_SDK_ROOT/tools/templates/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: بناء APK النسخة التجريبية
        run: ./gradlew assembleDebug

      - name: رفع ملف APK
        uses: actions/upload-artifact@v4
        with:
          name: تطبيقي-العربي.apk
          path: app/build/outputs/apk/debug/app-debug.apk
